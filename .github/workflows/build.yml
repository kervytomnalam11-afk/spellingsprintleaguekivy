name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential ccache \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libgstreamer1.0-dev \
            fonts-dejavu-core

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 virtualenv pillow

      - name: Generate icon.png and presplash.png
        run: |
          python make_icon.py
          ls -lh icon.png presplash.png

      - name: Cache Android SDK / NDK / buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: android-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            android-

      - name: Build debug APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpellingSprintLeague-debug
          path: bin/*.apk
          retention-days: 30
